<!-- NAV -->
<nav>
    <div class="nav-logo"><a href="{{ url_for('main.index') }}">Zuhraan</a></div>
    <ul class="nav-links">
        <li><a href="{{ url_for('main.index') }}">Home</a></li>
        <li><a href="{{ url_for('main.shop') }}">Shop</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
    <div class="nav-icons">
        <div class="search-box">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
            </svg>
            <input type="text" placeholder="Search...">
        </div>

        <a href="{{ url_for('main.cart') }}" class="account-link" style="position: relative;">
            <svg width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                <line x1="3" y1="6" x2="21" y2="6" />
                <path d="M16 10a4 4 0 0 1-8 0" />
            </svg>
            {% if cart_count and cart_count > 0 %}
            <span style="position: absolute; top: -8px; right: -8px; background: var(--amber); color: #fff; font-size: 0.65rem; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700;">{{ cart_count }}</span>
            {% endif %}
        </a>
        <a href="{{ url_for('main.account') }}" class="account-link">
            <svg width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>
        </a>
        <button class="hamburger" id="nav-toggle">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M3 12h18M3 6h18M3 18h18" />
            </svg>
        </button>
    </div>
</nav>

<div class="mobile-menu" id="mobile-menu">
    <button class="close-menu" id="close-menu">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M18 6L6 18M6 6l12 12" />
        </svg>
    </button>
    <ul class="mobile-links">
        <li><a href="{{ url_for('main.index') }}">Home</a></li>
        <li><a href="{{ url_for('main.shop') }}">Shop</a></li>
        <li><a href="{{ url_for('main.cart') }}">Cart</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</div>

<script>
    document.getElementById('nav-toggle').addEventListener('click', function() {
        document.getElementById('mobile-menu').classList.add('active');
    });
    document.getElementById('close-menu').addEventListener('click', function() {
        document.getElementById('mobile-menu').classList.remove('active');
    });
</script>
