{% extends 'base.html' %}
{% block title %}Identify - Zuhraan{% endblock %}
{% block content %}
<section style="max-width: 650px; margin: 60px auto 140px; padding: 0 40px; text-align: center;">
    <h1 style="font-family: 'Cormorant Garamond', serif; font-size: 3.8rem; margin-bottom: 10px;">Welcome Back</h1>
    <p style="color: var(--muted); margin-bottom: 40px;">Access your personal olfactory narrative.</p>
    
    <form method="POST" style="background: #fff; padding: 60px; border-radius: 40px; box-shadow: 0 25px 80px rgba(0,0,0,0.06); text-align: left;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="next" value="{{ next_url }}">
        <div style="margin-bottom: 30px;">
            <label style="display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; margin-bottom: 12px; color: var(--dark);">Email Address</label>
            <input type="email" name="email" placeholder="e.g. curator@zuhraan.com" required style="width: 100%; padding: 18px; border: 1px solid #ddd; border-radius: 12px; font-family: 'Jost', sans-serif; font-size: 1rem; color: var(--dark); outline: none; transition: border-color 0.2s;">
        </div>
        <div style="margin-bottom: 40px;">
            <label style="display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600; margin-bottom: 12px; color: var(--dark);">Password</label>
            <input type="password" name="password" placeholder="••••••••" required style="width: 100%; padding: 18px; border: 1px solid #ddd; border-radius: 12px; font-family: 'Jost', sans-serif; font-size: 1rem; color: var(--dark); outline: none;">
        </div>
        <button type="submit" style="width: 100%; padding: 20px; background: var(--dark); color: #fff; border: none; border-radius: 40px; font-weight: 700; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">Sign In to House</button>
        <style>
            button:hover { background: var(--amber) !important; transform: translateY(-3px); box-shadow: 0 15px 40px rgba(196, 100, 12, 0.2) !important; }
        </style>
    </form>
    
    <p style="margin-top: 40px; font-size: 0.95rem; color: var(--muted);">New connoisseur? <a href="{{ url_for('main.register') }}" style="color: var(--dark); font-weight: 600; text-decoration: none; border-bottom: 1px solid var(--amber);">Create Narrative Account</a></p>
</section>
{% endblock %}
